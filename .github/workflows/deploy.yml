name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [astro-v2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Copy demo projects into dist
        run: |
          for dir in 1-OLX-Scraper 2-Strony-Wizytowki 3-Excel-Automation 4-Telegram-Bot 5-Kalkulator-ROI 6-Generator-Wizytowek 7-Portfolio-Strona 8-Landing-Page-Generator 9-Invoice-Generator 10-StronaHR 11-Dentysta-Klinika 12-Fitness-Silownia 13-TODO-App 14-System-Rezerwacji 14-Weather-App 15-AI-Content-Generator 16-AI-Image-Editor; do
            if [ -d "$dir" ]; then
              cp -r "$dir" dist/
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
